services:
  timescaledatawebapp:
    image: timescaledatawebapp
    build:
      context: .
      dockerfile: TimeScaleDataWebApp.Api/Dockerfile
    container_name: timescale-api
    
    ports:
      - "5062:8080"
    
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=database;Port=5432;Database=TimeScaleData;Username=postgres;Password=postgres"
      
    depends_on:
      - database
  
  database:
    image: postgres:17
    
    container_name: timescale-db
    
    environment:
      POSTGRES_DB: TimeScaleData
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgesql/data
  
  frontend:
    image: timescaledatawebapp-frontend
    
    build:
      context: angular-app
      dockerfile: Dockerfile
    
    container_name: timescale-frontend
    
    ports:
      - "4200:80"
    
    depends_on:
      - timescaledatawebapp

volumes:
  postgres_data:


