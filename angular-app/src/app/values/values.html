<div class="card">

<h2>Получение данных файла</h2>

<input
    type="text"
    [(ngModel)]="fileName"
    placeholder="Введите имя файла">

<button (click)="search()">
    Найти
</button>

<hr>

@if (values().length > 0) {
    <h3>Результаты:</h3>



    <table>

    <thead>

      <tr>
      <th>Файл</th>
      <th>Дата</th>
      <th>Время выполнения:</th>
      <th>Значение:</th>
      </tr>

    </thead>
    <tbody>
      @for(value of values(); track $index) {
        <tr>
        <td>{{ value.fileName }}</td>
        <td>{{ value.date }}</td>
        <td>{{ value.executionTime }}</td>
        <td>{{ value.value }}</td>
        </tr>
      }
    </tbody>

  </table>
  }

</div>
